spring:
  datasource:
    url: jdbc:h2:mem:taskmanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: dGFza21hbmFnZW1lbnRhcHBzZWNyZXRrZXlmb3Jqd3RhdXRoZW50aWNhdGlvbjIwMjRzZWN1cmU=

logging:
  level:
    com.nazir: DEBUG
    org.springframework.security: INFO
